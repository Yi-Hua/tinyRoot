<ion-content [fullscreen]="true" class="tiny-root-bg">
  <div class="main-container">

    <header class="app-header">
      <div class="ledger-switcher" (click)="openLedgerPicker()">
        <span class="dot"></span>
        <span class="ledger-name">寶寶成長帳本</span>
        <ion-icon name="chevron-down-outline"></ion-icon>
      </div>
      <div class="user-avatar">
        <img src="assets/avatar-mom.png" alt="Mom">
      </div>
    </header>

    <section class="summary-card">
      <div class="label">本月支出預算</div>
      <div class="amount-row">
        <span class="currency">NT$</span>
        <span class="amount">{{ totalExpense | number }}</span>
      </div>
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" [style.width.%]="65"></div>
        </div>
        <div class="progress-info">
          <span>已使用 65%</span>
          <span>剩餘 $8,400</span>
        </div>
      </div>
    </section>

    <section class="record-section">
      <div class="section-title">
        <span>最近紀錄</span>
        <ion-note>查看全部</ion-note>
      </div>

      <div class="record-list">
        <div *ngFor="let trans of transactions" class="record-item">
          <div class="item-icon" [class]="trans.category">
            {{ getEmoji(trans.category) }}
          </div>
          <div class="item-detail">
            <div class="top-row">
              <span class="desc">{{ trans.description }}</span>
              <span class="price">{{ trans.amount | number }}</span>
            </div>
            <div class="bottom-row">
              <span class="meta">{{ trans.date | date:'MM/dd' }} · {{ trans.spender === 'Dad' ? '爸爸' : '媽媽' }}</span>
              <span class="tag">{{ trans.category }}</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <ion-fab vertical="bottom" horizontal="center" slot="fixed">
    <ion-fab-button class="add-btn" (click)="openAddModal()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
