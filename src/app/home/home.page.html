<ion-content [fullscreen]="true" class="baby-theme">

  <div class="container">
    <div class="header-section">
      <div class="app-title">🌱 Tiny Root</div>
      <div class="total-balance">
        <span class="currency">$</span>
        {{ totalExpense | number }}
      </div>
      <div class="subtitle">本月家庭支出</div>
    </div>

    <div class="input-box">
      <div class="row-inputs">
        <div class="date-picker-wrapper">
          <ion-datetime-button datetime="datetime"></ion-datetime-button>
          <ion-modal [keepContentsMounted]="true">
            <ng-template>
              <ion-datetime id="datetime" presentation="date" [(ngModel)]="newDate"></ion-datetime>
            </ng-template>
          </ion-modal>
        </div>

        <div class="amount-input-wrapper">
          <span class="symbol">$</span>
          <ion-input type="number" placeholder="0" [(ngModel)]="newAmount" class="big-input"></ion-input>
        </div>
      </div>

      <div class="desc-input-wrapper">
        <ion-input type="text" placeholder="📝 買了什麼呢？(例如: 尿布)" [(ngModel)]="newDesc"></ion-input>
      </div>

      <div class="category-selector">
        <div class="cat-option"
             [class.active]="newCategory === 'Needs'"
             (click)="newCategory = 'Needs'">
          <div class="emoji">🔴</div>
          <span>必要</span>
        </div>
        <div class="cat-option"
             [class.active]="newCategory === 'Wants'"
             (click)="newCategory = 'Wants'">
          <div class="emoji">🟡</div>
          <span>想要</span>
        </div>
        <div class="cat-option"
             [class.active]="newCategory === 'Savings'"
             (click)="newCategory = 'Savings'">
          <div class="emoji">🟢</div>
          <span>存錢</span>
        </div>
      </div>

      <div class="spender-selector">
        <select [(ngModel)]="newSpender">
          <option value="Dad">👨🏻 爸爸</option>
          <option value="Mom">👩🏻 媽媽</option>
        </select>
      </div>

      <ion-button color="primary" expand="block" (click)="add()">
        記下一筆
      </ion-button>
    </div>

    <div class="list-section">
      <div class="list-header">最近紀錄</div>

      <div *ngFor="let trans of transactions" class="cute-card">
        <div class="card-icon">
          {{ trans.category === 'Needs' ? '🍼' : (trans.category === 'Wants' ? '🧸' : '🌱') }}
        </div>
        <div class="card-info">
          <div class="card-desc">{{ trans.description }}</div>
          <div class="card-meta">{{ trans.date | date:'M/d' }} · {{ trans.spender === 'Dad' ? '👨🏻' : '👩🏻' }}</div>
        </div>
        <div class="card-amount">
          {{ trans.amount | number }}
        </div>
      </div>
    </div>

  </div>

  <div class="row-inputs">
    <div class="amount-input-wrapper">
      </div>
    <div style="display: flex; gap: 8px;">
      <!-- <ion-button color="primary" (click)="scanInvoice()">
        <ion-icon name="scan-outline" slot="icon-only"></ion-icon>
      </ion-button> -->
      <ion-button color="primary" fill="outline" (click)="openSyncModal()">
        <ion-icon name="cloud-download-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </div>

  </div>
</ion-content>
